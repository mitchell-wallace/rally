schema_version = 2
run_hooks_on_autocommit = false

# Bare-alias models. Used when a route entry is a plain harness alias
# (e.g. "claude" / "cc") with no named model attached. Also the fallback
# when a [harness.<n>.models] lookup misses.
[defaults]
claude_model      = 'claude-opus-4-8'
codex_model       = 'gpt-5.5'
gemini_model      = 'gemini-3.1-pro-preview'
opencode_model    = 'zai-coding-plan/glm-5.2'
antigravity_model = 'Gemini 3.5 Flash (High)'

[laps]

[fallback]

[reliability]
freeze_threshold_secs = 120
retry_budget          = 5

# Named model shortcuts — referenced from [routes] or --agent as
# `<alias>:<name>`, e.g. `cc:opus`, `op:zai`. Model names must be
# non-numeric (rally rejects `4` to keep quota parsing unambiguous).

[harness.cc.models]
opus   = 'claude-opus-4-8'
# opus   = 'claude-opus-4-8-disabled' # invalid slug to disable use of expensive model temporarily
sonnet = 'claude-sonnet-4-6'
haiku  = 'claude-haiku-4-5'

[harness.cx.models]
# review codex while doing big work elsewhere
g55 = 'gpt-5.5'
g54  = 'gpt-5.4'
mini = 'gpt-5.4-mini'
g53 = 'gpt-5.3-codex'

[harness.ge.models]
pro   = 'gemini-3.1-pro-preview'
flash = 'gemini-3-flash-preview'

[harness.op.models]
zai  = 'zai-coding-plan/glm-5.2'
# zgo = 'opencode-go/glm-5.1'
# kimi = 'opencode-go/kimi-k2.7-code'
# mini = 'opencode-go/minimax-m3'
# ds = 'opencode-go/deepseek-v4-pro'
dsf = 'opencode/deepseek-v4-flash-free'
# qwen = 'opencode-go/qwen3.7-max'

# agy 1.0.0 has no model CLI flag, so rally
# patches ~/.gemini/antigravity-cli/settings.json per-run.
[harness.ag.models]
flash = 'Gemini 3.5 Flash (High)'
pro = 'Gemini 3.1 Pro (High)'
opus = 'Claude Opus 4.6 (Thinking)'
sonnet = 'Claude Sonnet 4.6 (Thinking)'

# Per-role fallback patterns.
#
# Quota semantics (read README §[routes] before changing):
#   no quota   stay on this entry until it FAILS, then advance
#   :N         run exactly N consecutive iterations, then advance
#   :N-M       prefer rotating after N; allow up to M if peers are exhausted/frozen
#
# A route is a list. Rally walks it left-to-right, skipping entries that
# fail or freeze. So `["cc:opus", "cx:g55", "op:zai"]` reads as:
# "use opus; if it dies, switch to gpt-5.5; if that dies, switch to glm".
#
# Prefer at least two entries per lane. A single-runner lane has no fallback
# when its harness fails — Rally will warn at relay start.
[routes]



# Balanced rotation when no role matches the lap assignee.
default = ['cc:opus:1', 'cx:g55:1', 'op:zai:1', 'ag:flash:1', 'ag:pro:1', 'op:kimi:1']

# Frontier models to make judgement calls
senior = ['ag:opus', 'cx:g55', 'cc:opus', 'op:ds', 'op:kimi']

# Regular well-defined work. Rotates per iteration.
junior = ['op:zai', 'ge:pro', 'ag:flash', 'ag:pro', 'op:kimi', 'op:zgo', 'cx:g54', 'cc:sonnet']

# UI / visual reasoning. Prefer gemini, fall back to claude sonnet.
ui = ['ag:flash', 'ge:pro', 'ag:pro', 'op:kimi', 'cc:sonnet', 'ag:sonnet']

# Verification / review tasks. Codex first, claude as backup.
verify = ['cx:g54', 'cx:g55', 'cc:opus', 'ag:opus', 'op:ds']

recovery = ['cx:g54', 'cx:g55', 'cc:opus', 'ag:opus', 'op:ds']


# Custom role example
explore = ['op:dsf:2', 'op:mini:3']


# Per-role reasoning / variant preferences. Keys are role names (the same
# names used in [routes], matched case-insensitively). Each value is resolved
# ONLY after the selected route entry's harness is known, and ONLY when that
# entry has no explicit model token — an explicit model like `cx:g55` always
# wins. Layers role-level defaults on top of [routes] / [harness.*.models].
#
# A value may be:
#   * a bare model alias resolved in the selected harness, e.g. `g55-xh` /
#     `g55-l` — a variant you named under [harness.cx.models]; changes the
#     model and sets no effort flag.
#   * a harness-scoped alias, e.g. `cx:g55-xh` — resolves only when the route
#     selects codex; ignored for other harnesses.
#   * a bare effort token, e.g. `xhigh` / `high` / `low` — applied as a
#     reasoning-effort flag to the selected harness where supported.
#
# Harness-specific effort injection (for a bare effort token):
#   codex       -c model_reasoning_effort=<v>   none|minimal|low|medium|high|xhigh
#   claude      --effort <v>                    low|medium|high|xhigh|max
#   opencode    --variant <v>                   provider-specific, no fixed set
#   gemini      unsupported — warned and skipped (pick a model to change reasoning)
#   antigravity unsupported as a flag — reasoning encoded in the model alias/name
#
# Unknown effort tokens warn and pass through (codex rejects bad values at the
# API). A missing harness-scoped alias (e.g. `cx:typo`) is a hard error in
# `rally routes check`. Uncomment to opt in; the aliases below must exist in
# [harness.<name>.models] to resolve to a model, else they act as effort tokens.
#
# [reasoning]
# verify = 'g55-xh'   # high-reasoning variant on the codex-led verify lane
# junior = 'g55-l'    # lightweight variant on the opencode-led junior lane

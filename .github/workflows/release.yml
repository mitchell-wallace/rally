name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --json tagName --jq .tagName > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        if: steps.check.outputs.exists != 'true'
        with:
          go-version-file: go.mod

      - name: Verify telemetry secret
        if: steps.check.outputs.exists != 'true'
        run: |
          if [ -z "$RALLY_NEW_RELIC_LICENSE_KEY" ]; then
            echo "Error: RALLY_NEW_RELIC_LICENSE_KEY secret is empty but required for new releases." >&2
            exit 1
          fi
        env:
          RALLY_NEW_RELIC_LICENSE_KEY: ${{ secrets.RALLY_NEW_RELIC_LICENSE_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        if: steps.check.outputs.exists != 'true'
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RALLY_NEW_RELIC_LICENSE_KEY: ${{ secrets.RALLY_NEW_RELIC_LICENSE_KEY }}

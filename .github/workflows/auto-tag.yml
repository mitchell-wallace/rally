name: auto-tag

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION changed, create tag, and dispatch release
        run: |
          VERSION_FILE="internal/buildinfo/VERSION"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" =~ ^0+$ ]] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            if git diff-tree --no-commit-id --quiet -r "$AFTER" -- "$VERSION_FILE"; then
              echo "VERSION file unchanged, skipping."
              exit 0
            fi
          elif git diff --quiet "$BEFORE" "$AFTER" -- "$VERSION_FILE"; then
            echo "VERSION file unchanged, skipping."
            exit 0
          fi

          VERSION="v$(cat "$VERSION_FILE")"
          echo "VERSION changed to $VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" > /dev/null; then
            echo "Tag $VERSION already exists on origin."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Created and pushed tag $VERSION"
          fi

          echo "Dispatching release workflow for $VERSION"
          gh api "repos/{owner}/{repo}/actions/workflows/release.yml/dispatches" \
            --method POST \
            --field ref="$VERSION"
        env:
          GH_TOKEN: ${{ github.token }}
